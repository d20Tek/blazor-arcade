<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Blazor Arcade</title>
    <base href="/" />

    <!-- The page supports both dark and light color schemes,
         and the page author prefers / default is DARK. -->
    <meta name="color-scheme" content="dark light" />

    <!-- Replace the Bootstrap CSS with the
         Bootstrap-Dark Variant CSS
         source: https://github.com/vinorodrigues/bootstrap-dark-5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-dark-5@1.1.3/dist/css/bootstrap-unlit.min.css" rel="stylesheet" />

    <link href="css/app.css" rel="stylesheet" />
    <link href="Blazor.Arcade.Client.styles.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app" style="margin: 0 auto; width: 100vw; height: 100vh">
        <div class="text-center pt-3" style="font-size: 16pt">
            Loading...
        </div>
        <div class="text-center mt-3">
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"
                  style="font-size: 16pt; width: 36px; height: 36px; color: darkslateblue" />
        </div>
        <div class="text-center">
            <img src="/images/arcade-splash-3.png" />
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
